apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "consumer.fullname" . }}-config
data:
  application.yml: |
    server:
      port: {{ .Values.service.port }}

    spring:
      application:
        name: {{ .Release.Name }}

      # Kafka Configuration
      kafka:
        bootstrap-servers: kafka:9092
        consumer:
          group-id: story-group
          auto-offset-reset: earliest
          key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
          value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

      # Database Configuration (Optional for consumer but kept for consistency)
      datasource:
        driver-class-name: org.mariadb.jdbc.Driver
        url: jdbc:mariadb://mariadb:3306/story?createDatabaseIfNotExist=true

      jpa:
        generate-ddl: true
        hibernate:
          ddl-auto: update
        properties:
          hibernate:
            dialect: org.hibernate.dialect.MariaDBDialect

    # Monitoring & Metrics Configuration
    management:
      endpoints:
        web:
          exposure:
            include: health,info,prometheus
      endpoint:
        health:
          show-details: always
        prometheus:
          enabled: true
      metrics:
        export:
          prometheus:
            enabled: true